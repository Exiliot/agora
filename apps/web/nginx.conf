server {
  listen 8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Security headers. CSP allows Google Fonts (Inter + IBM Plex) and inline
  # styles (the design system uses inline `style={}` objects heavily). Scripts
  # are self-only because Vite bundles everything at build.
  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }

  # REST — preserve /api/ prefix (api routes are mounted at /api/*).
  location /api/ {
    proxy_pass         http://api:3000;
    proxy_http_version 1.1;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  # WebSocket
  location /ws {
    proxy_pass         http://api:3000/ws;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade $http_upgrade;
    proxy_set_header   Connection "upgrade";
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 3600s;
  }

  # Static cache
  location ~* \.(js|css|woff2?|ttf|svg|png|jpg|webp)$ {
    expires 1h;
    add_header Cache-Control "public";
  }

  # Ensure HTML is never cached so new deploys roll cleanly
  location = /index.html {
    add_header Cache-Control "no-store";
  }
}
