#cloud-config
# Provisions an Ubuntu 22.04 ARM instance with Docker + Compose, clones the
# agora repo, then brings the stack up. Runs once on first boot. Logs go to
# /var/log/cloud-init-output.log – tail there if the app doesn't come up.

package_update: true
package_upgrade: false

packages:
  - ca-certificates
  - curl
  - git
  - iptables-persistent

# iptables rules installed early so the ports are open by the time docker
# publishes them. Oracle's Ubuntu image ships with a default-DROP INPUT
# chain, hence the explicit ACCEPTs.
bootcmd:
  - iptables -I INPUT 6 -p tcp -m tcp --dport 22 -j ACCEPT
  - iptables -I INPUT 6 -p tcp -m tcp --dport 80 -j ACCEPT
  - iptables -I INPUT 6 -p tcp -m tcp --dport 443 -j ACCEPT
  - iptables -I INPUT 6 -p tcp -m tcp --dport 8080 -j ACCEPT
  - netfilter-persistent save

runcmd:
  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
  - chmod a+r /etc/apt/keyrings/docker.asc
  - |
    . /etc/os-release && echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu $VERSION_CODENAME stable" > /etc/apt/sources.list.d/docker.list
  - apt-get update
  - apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
  - usermod -aG docker ubuntu
  - git clone --branch ${repo_branch} ${repo_url} /home/ubuntu/agora
  - chown -R ubuntu:ubuntu /home/ubuntu/agora
  - cd /home/ubuntu/agora && docker compose up -d --build

final_message: "agora bootstrap done in $UPTIME seconds. Open http://$PUBLIC_IPV4:8080"
