name: agora

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    # No host port: postgres is only reachable from the api container via
    # the compose network. Developers who want psql access can override with
    # `docker compose exec db psql -U app -d app` or add a ports stanza in a
    # docker-compose.override.yml that stays out of the committed tree.
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 2s
      timeout: 3s
      retries: 30

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOST: "0.0.0.0"
      PORT: "3000"
      DATABASE_URL: "postgres://app:app@db:5432/app"
      # SESSION_SECRET intentionally unset — api generates a random one at boot.
      # Set this in a real deployment so sessions survive restarts.
      STORAGE_ROOT: "/data/attachments"
      # Absolute URL the web app is reachable at; used for the password-reset
      # link logged to stdout when a user requests a reset. Change if you're
      # exposing the demo on a host other than localhost.
      APP_BASE_URL: "http://localhost:8080"
      # Demo mode: the password-reset handler logs the single-use link to
      # stdout so the operator can grep it (no mailer is wired). Flip to "0"
      # in any deployment that wires a real mailer via auth/mailer.ts.
      # See ADR-0010.
      AGORA_DEMO_MODE: "1"
      # ALLOW_DEV_SEED is OFF in the committed compose file. Enable it with a
      # docker-compose.override.yml when you want the bulk-register endpoint
      # for load testing — it's unauthenticated by design.
    ports:
      - "3000:3000"
    volumes:
      - attachments:/data/attachments
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - api

volumes:
  pgdata:
  attachments:
