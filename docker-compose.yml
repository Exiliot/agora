name: agora

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 2s
      timeout: 3s
      retries: 30

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOST: "0.0.0.0"
      PORT: "3000"
      DATABASE_URL: "postgres://app:app@db:5432/app"
      SESSION_SECRET: "dev-only-session-secret-change-me-in-production-xxxxxxxxx"
      STORAGE_ROOT: "/data/attachments"
    ports:
      - "3000:3000"
    volumes:
      - attachments:/data/attachments
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - api

volumes:
  pgdata:
  attachments:
