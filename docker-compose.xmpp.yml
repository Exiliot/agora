# Phase 2 XMPP federation overlay.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.xmpp.yml up --build
#
# Two Prosody instances federate via dialback (XEP-0220, no certs) over the
# compose network. Both authenticate users against agora's HTTP endpoint, so
# any registered agora user can sign in as <username>@server-a or
# <username>@server-b.
#
# Host port map:
#   5222  → prosody-a c2s (STARTTLS)
#   5223  → prosody-a c2s direct-TLS (xmpps://)
#   5269  → prosody-a s2s
#   5322  → prosody-b c2s (STARTTLS)
#   5323  → prosody-b c2s direct-TLS (xmpps://)
#   5369  → prosody-b s2s

services:
  api:
    environment:
      ENABLE_XMPP_BRIDGE: "1"

  prosody-a:
    build:
      context: ./tools/prosody
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    environment:
      PROSODY_DOMAIN: "server-a"
      PROSODY_MUC_DOMAIN: "rooms.server-a"
      PROSODY_AUTH_URL: "http://api:3000/internal/xmpp/auth"
    ports:
      - "5222:5222"
      - "5223:5223"
      - "5269:5269"
    networks:
      default:
        aliases:
          - server-a

  prosody-b:
    build:
      context: ./tools/prosody
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    environment:
      PROSODY_DOMAIN: "server-b"
      PROSODY_MUC_DOMAIN: "rooms.server-b"
      PROSODY_AUTH_URL: "http://api:3000/internal/xmpp/auth"
    ports:
      - "5322:5222"
      - "5323:5223"
      - "5369:5269"
    networks:
      default:
        aliases:
          - server-b
